name: Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    name: Label PR by changed files
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true   # removes labels that no longer match

  label-issue:
    name: Label issue by keywords
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Apply keyword labels to issue
        uses: actions/github-script@v7
        with:
          script: |
            const title  = context.payload.issue.title.toLowerCase();
            const body   = (context.payload.issue.body || '').toLowerCase();
            const text   = title + ' ' + body;
            const labels = [];

            // ── Customize these keyword → label rules ──────────────────
            const rules = [
              { keywords: ['bug', 'error', 'crash', 'broken', 'fail'],  label: 'bug'           },
              { keywords: ['feat', 'feature', 'request', 'enhance'],    label: 'enhancement'   },
              { keywords: ['doc', 'docs', 'readme', 'documentation'],   label: 'documentation' },
              { keywords: ['question', 'help', 'how to', 'how do'],     label: 'question'      },
              { keywords: ['perf', 'performance', 'slow', 'speed'],     label: 'performance'   },
              { keywords: ['security', 'vuln', 'cve', 'exploit'],       label: 'security'      },
            ];
            // ───────────────────────────────────────────────────────────

            for (const rule of rules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                labels.push(rule.label);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.issue.number,
                labels,
              });
            }
