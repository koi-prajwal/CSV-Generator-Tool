name: CI Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write  # needed to post PR comments

jobs:
  run-checks:
    name: Run Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Customize this block for your stack ──────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        id: lint
        run: npm run lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Run tests
        id: test
        run: npm test 2>&1 | tee test-output.txt
        continue-on-error: true
      # ─────────────────────────────────────────────────────────────────────

      - name: Build check summary
        id: summary
        run: |
          LINT_STATUS="${{ steps.lint.outcome }}"
          TEST_STATUS="${{ steps.test.outcome }}"

          lint_icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }
          test_icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          {
            echo "body<<EOF"
            echo "## 🤖 CI Bot Report"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Lint  | $(lint_icon $LINT_STATUS) \`$LINT_STATUS\` |"
            echo "| Tests | $(test_icon $TEST_STATUS) \`$TEST_STATUS\` |"
            echo ""
            if [ -f lint-output.txt ] && [ "$LINT_STATUS" != "success" ]; then
              echo "<details><summary>Lint output</summary>"
              echo ""
              echo '```'
              tail -n 40 lint-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi
            if [ -f test-output.txt ] && [ "$TEST_STATUS" != "success" ]; then
              echo "<details><summary>Test output</summary>"
              echo ""
              echo '```'
              tail -n 60 test-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi
            echo "> _Generated by CI bot · $(date -u '+%Y-%m-%d %H:%M UTC')_"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post results comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.summary.outputs.body }}`;
            const marker = '<!-- ci-bot-report -->';
            const fullBody = marker + '\n' + body;

            // Find and update an existing bot comment instead of spamming new ones
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Fail if any check failed
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
